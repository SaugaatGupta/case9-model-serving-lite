name: retrain

on:
  pull_request:
    paths:
      - "data/train.csv"

permissions:
  contents: read
  pull-requests: write

jobs:
  retrain-and-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Retrain candidate
        run: python scripts/retrain.py --train data/train.csv --out models/candidate.pkl

      - name: Evaluate candidate
        run: python scripts/evaluate.py --model models/candidate.pkl --eval eval/held_out.csv --out metrics.json

      - name: Gate vs baseline (fail if f1 regression > 0.02)
        id: gate
        run: |
          set -euo pipefail
          python - <<'PY'
          import json, sys, pathlib
          new = json.loads(pathlib.Path("metrics.json").read_text())
          base = json.loads(pathlib.Path("models/baseline.json").read_text())
          delta = base["f1"] - new["f1"]
          print(f"baseline_f1={base['f1']:.4f} candidate_f1={new['f1']:.4f} regression={delta:+.4f}")
          if delta > 0.02:
              print("::error::f1 regressed by more than 0.02; failing the workflow")
              sys.exit(1)
          PY

      - name: Post PR comment with metrics table
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let base, cand;
            try { base = JSON.parse(fs.readFileSync('models/baseline.json','utf8')); } catch { base = {f1:null,precision:null,recall:null}; }
            try { cand = JSON.parse(fs.readFileSync('metrics.json','utf8')); } catch { cand = {f1:null,precision:null,recall:null}; }
            const fmt = v => (v==null?'—':Number(v).toFixed(4));
            const delta = (a,b)=> (a==null||b==null?'—':((b-a)>=0?'+':'')+(b-a).toFixed(4));
            const body = [
              '### Retrain results',
              '',
              '| metric | baseline | candidate | Δ |',
              '|---|---:|---:|---:|',
              `| f1        | ${fmt(base.f1)}        | ${fmt(cand.f1)}        | ${delta(base.f1,cand.f1)} |`,
              `| precision | ${fmt(base.precision)} | ${fmt(cand.precision)} | ${delta(base.precision,cand.precision)} |`,
              `| recall    | ${fmt(base.recall)}    | ${fmt(cand.recall)}    | ${delta(base.recall,cand.recall)} |`,
              '',
              'Gate: fail if baseline.f1 − candidate.f1 > 0.02.'
            ].join('\n');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });
